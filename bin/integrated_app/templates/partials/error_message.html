<div class="tts-error-block">
  <div class="error-title">{{ "gen_failed"|t(lang) }}</div>
  <div class="error-message">{{ error_message }}</div>
  <div style="margin-top:12px;display:flex;gap:8px;">
    <button type="button" onclick="this.closest('.tts-error-block').querySelector('.retry-btn')?.click(); if(window._retryLastGeneration) window._retryLastGeneration();" style="padding:6px 16px;border-radius:6px;border:none;background:#10B981;color:#fff;cursor:pointer;font-size:13px;">{{ "retry"|t(lang) }}</button>
  </div>
</div>
