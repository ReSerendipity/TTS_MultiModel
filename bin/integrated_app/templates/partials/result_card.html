{# Result Audio Card - Shared partial for all TTS generation tabs #}
{# Usage: include 'partials/result_card.html' with prefix, title_key, lang variables #}
<div class="card">
    <div class="card-header">
        <span class="card-header-icon tts-card-header-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C6EF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
        </span>
        <h3 class="card-header-title">{{ title_key|default("result_audio")|t(lang) }}</h3>
    </div>
    <div id="{{ prefix }}-result" aria-live="polite">
        <div id="{{ prefix }}-spinner" class="htmx-indicator" style="display:none;text-align:center;padding:24px;">
            <div class="tts-loading-spinner" style="margin:0 auto 8px;"></div>
            <div class="tts-loading-text">{{ "generating"|t(lang) }}</div>
        </div>
        <div class="status-message" id="{{ prefix }}-status"></div>
    </div>
    <audio class="tts-audio-player" id="{{ prefix }}-audio" controls style="width:100%;display:none;"></audio>
</div>
