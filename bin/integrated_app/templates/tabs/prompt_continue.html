<div class="card">
    <div class="card-header">
        <span class="card-header-icon" style="display:inline-flex !important;align-items:center !important;justify-content:center !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C6EF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><path d="M5 3l14 9-14 9V3z"/></svg></span>
        <h3 class="card-header-title">{{ "tab_prompt_continue"|t(lang) }}</h3>
    </div>
    <div style="padding:0 16px 12px;font-size:13px;color:var(--text-muted);">{{ "prompt_continue_desc"|t(lang) }}</div>
    <form id="pc-form" hx-post="/api/generate/voxcpm_prompt_continue" hx-target="#pc-result" hx-swap="innerHTML" hx-indicator="#pc-spinner" hx-encoding="multipart/form-data">
        <label>{{ "synthesis_text"|t(lang) }}</label>
        <textarea name="text" class="tts-input-textarea" rows="4" placeholder="{{ 'enter_text_placeholder'|t(lang) }}"></textarea>
        <label style="margin-top:8px;">{{ "language"|t(lang) }}</label>
        <select name="lang" class="tts-input-dropdown" style="width:100%;">
            {% for l in langs %}
            <option value="{{ l }}" {% if l == 'Auto' %}selected{% endif %}>{{ l }}</option>
            {% endfor %}
            <optgroup label="{{ 'chinese_dialects'|t(lang) }}">
                {% for dialect in dialects %}
                <option value="{{ dialect[0] }}">{{ dialect[1] }}</option>
                {% endfor %}
            </optgroup>
        </select>

        <div style="margin:16px 0;">
            <label>{{ "prompt_audio"|t(lang) }}</label>
            <input type="file" name="prompt_wav" class="tts-input-file" accept=".wav,.mp3,.ogg,.flac" style="width:100%;margin-top:8px;" required>
        </div>

        <div style="margin:16px 0;">
            <label>{{ "prompt_text_label"|t(lang) }}</label>
            <input type="text" name="prompt_text" class="tts-input-textbox" placeholder="{{ 'ref_text_placeholder'|t(lang) }}" style="width:100%;" required>
        </div>

        <button type="submit" class="primary-btn generate-btn" style="width:100%;">{{ "generate_prompt_continue"|t(lang) }}</button>
    </form>
</div>
<div class="card">
    <div class="card-header">
        <span class="card-header-icon" style="display:inline-flex !important;align-items:center !important;justify-content:center !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C6EF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></span>
        <h3 class="card-header-title">{{ "result_audio"|t(lang) }}</h3>
    </div>
    <div id="pc-result">
        <div id="pc-spinner" class="htmx-indicator" style="display:none;text-align:center;padding:24px;">
            <div class="tts-loading-spinner" style="margin:0 auto 8px;"></div>
            <div class="tts-loading-text">{{ "generating"|t(lang) }}</div>
        </div>
        <div class="status-message" id="pc-status"></div>
    </div>
    <audio class="tts-audio-player" id="pc-audio" controls style="width:100%;display:none;"></audio>
    <details class="pp-section" id="pc-pp-section" style="display:none;margin-top:8px;border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;">
        <summary style="cursor:pointer;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text-secondary);background:var(--bg-tertiary);">{{ "post_processing"|t(lang) }}</summary>
        <div style="padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;">
            <div>
                <label style="font-size:12px;">{{ "speed_factor"|t(lang) }}</label>
                <div style="display:flex;align-items:center;gap:6px;">
                    <input type="range" id="pc-pp-tempo" min="0.5" max="2.0" step="0.1" value="1.0" style="flex:1;" oninput="document.getElementById('pc-pp-tempo-val').textContent=this.value">
                    <span id="pc-pp-tempo-val" style="font-size:12px;min-width:28px;text-align:right;">1.0</span>
                </div>
            </div>
            <div>
                <label style="font-size:12px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;">
                    <input type="checkbox" id="pc-pp-enhance">
                    {{ "voice_enhancement"|t(lang) }}
                </label>
            </div>
        </div>
        <div style="padding:0 12px 10px;text-align:right;">
            <button type="button" class="secondary-btn" style="font-size:12px;padding:4px 14px;" onclick="pcReprocess()">{{ "reprocess"|t(lang) }}</button>
        </div>
    </details>
</div>
<script>
(function(){
    // Frontend validation: prevent empty text submission
    document.getElementById('pc-form').addEventListener('submit', function(e) {
        var textarea = this.querySelector('textarea[name="text"]');
        var promptText = this.querySelector('input[name="prompt_text"]');
        var promptWav = this.querySelector('input[name="prompt_wav"]');
        if (textarea && !textarea.value.trim()) {
            e.preventDefault();
            var statusEl = document.getElementById('pc-status');
            if (statusEl) {
                statusEl.className = 'status-message error';
                statusEl.textContent = '{{ "enter_text"|t(lang) }}';
            }
            return false;
        }
        if (promptText && !promptText.value.trim()) {
            e.preventDefault();
            var statusEl = document.getElementById('pc-status');
            if (statusEl) {
                statusEl.className = 'status-message error';
                statusEl.textContent = '{{ "enter_prompt_text"|t(lang) }}';
            }
            return false;
        }
        if (promptWav && !promptWav.files.length) {
            e.preventDefault();
            var statusEl = document.getElementById('pc-status');
            if (statusEl) {
                statusEl.className = 'status-message error';
                statusEl.textContent = '{{ "no_file_selected"|t(lang) }}';
            }
            return false;
        }
    });
    document.getElementById('pc-form').addEventListener('htmx:afterRequest', function(e){
        if (e.detail.successful) {
            var audioEl = document.getElementById('pc-audio');
            var audioSrc = document.querySelector('#pc-result audio');
            if (audioSrc) {
                audioEl.src = audioSrc.src;
                audioEl.style.display = '';
                try { audioEl.play(); } catch(ex) {}
            }
            // Show post-processing section when audio is available
            var wrapper = document.querySelector('#pc-result [data-audio-filename]');
            var ppSection = document.getElementById('pc-pp-section');
            if (wrapper && ppSection) {
                ppSection.style.display = '';
            }
        }
    });

    // Post-processing re-process
    window.pcReprocess = async function() {
        var resultEl = document.getElementById('pc-result');
        if (!resultEl) return;
        var wrapper = resultEl.querySelector('[data-audio-filename]');
        if (!wrapper) return;
        var audioPath = wrapper.getAttribute('data-audio-filename');
        var tempo = document.getElementById('pc-pp-tempo').value;
        var enhance = document.getElementById('pc-pp-enhance').checked ? 'true' : 'false';
        var statusEl = document.getElementById('pc-status');
        statusEl.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">Processing...</div>';
        try {
            var resp = await fetch('/api/generate/post-process', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'audio_path=' + encodeURIComponent(audioPath) + '&tempo_factor=' + tempo + '&voice_enhancement=' + enhance + '&target_lufs=-16.0'
            });
            var html = await resp.text();
            resultEl.innerHTML = html;
            var audioSrc = resultEl.querySelector('audio');
            var audioEl = document.getElementById('pc-audio');
            if (audioSrc && audioEl) {
                audioEl.src = audioSrc.src;
                audioEl.style.display = '';
                audioEl.play().catch(function(ex) {});
            }
        } catch(err) {
            statusEl.innerHTML = '<div class="tts-error-block"><div class="error-message">' + err.message + '</div></div>';
        }
    };
})();
</script>
