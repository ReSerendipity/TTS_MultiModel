<div class="card">
    <div class="card-header">
        <span class="card-header-icon" style="display:inline-flex !important;align-items:center !important;justify-content:center !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C6EF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg></span>
        <h3 class="card-header-title">{{ "input_settings"|t(lang) }}</h3>
    </div>
    <style>
        /* ===== Voice Design Tab Styles ===== */

        /* Full-width form inputs */
        .vd-full-width {
            width: 100%;
            box-sizing: border-box;
        }

        /* Character counter */
        .char-counter {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .char-counter.warning {
            color: #f59e0b;
            font-weight: 600;
        }
        .char-counter.danger {
            color: #ef4444;
            font-weight: 700;
        }

        /* Voice preset tags - pill-shaped chips with gradient borders */
        .voice-preset-tag {
            display: inline-block;
            padding: 5px 14px;
            margin: 3px 4px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
            border: 1.5px solid transparent;
            background-clip: padding-box;
            position: relative;
            color: var(--text-secondary);
            background-color: var(--bg-secondary, #f3f4f6);
            transition: all 0.2s ease;
            user-select: none;
        }
        .voice-preset-tag::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: 999px;
            background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
            z-index: -1;
            opacity: 0.5;
            transition: opacity 0.2s ease;
        }
        .voice-preset-tag:hover {
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.2);
        }
        .voice-preset-tag:hover::before {
            opacity: 1;
        }
        .voice-preset-tag.preset-tag-active {
            color: #fff;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border-color: transparent;
            box-shadow: 0 2px 12px rgba(139, 92, 246, 0.35);
        }
        .voice-preset-tag.preset-tag-active::before {
            opacity: 1;
            background: linear-gradient(135deg, #a78bfa, #818cf8, #6366f1);
        }

        /* Instruct input */
        .vd-instruct-input {
            width: 100%;
            margin-bottom: 8px;
        }

        /* Full-width button */
        .vd-full-width-btn {
            width: 100%;
        }

        /* Keyboard shortcut hint */
        .vd-shortcut-hint {
            text-align: center;
            margin-top: -8px;
            margin-bottom: 8px;
        }

        /* Flex row for save controls */
        .vd-flex-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        /* Save name input */
        .vd-save-name-input {
            flex: 3;
        }

        /* Save button */
        .vd-save-btn {
            flex: 1;
        }

        /* Persona description text */
        .vd-persona-desc {
            margin-top: 8px;
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }

        /* Stream generate button */
        .stream-btn {
            background: linear-gradient(135deg, #8b5cf6, #a855f7) !important;
            border: none;
            color: #fff;
            transition: all 0.2s ease;
            box-shadow: 0 2px 10px rgba(139, 92, 246, 0.3);
        }
        .stream-btn:hover {
            background: linear-gradient(135deg, #7c3aed, #9333ea) !important;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.45);
            transform: translateY(-1px);
        }

        /* Centered spinner */
        .vd-spinner-centered {
            margin: 0 auto 8px;
        }

        /* Hidden audio player */
        .vd-audio-hidden {
            width: 100%;
            display: none;
        }
    </style>
    <form id="vd-form" hx-post="/api/generate/voxcpm_design" hx-target="#vd-result" hx-swap="innerHTML" hx-indicator="#vd-spinner">
        <input type="hidden" name="mode" value="voxcpm_design">
        <label>{{ "synthesis_text"|t(lang) }}</label>
        <textarea name="text" class="tts-input-textbox vd-full-width" rows="3" placeholder="{{ 'enter_text_placeholder'|t(lang) }}" required maxlength="500" oninput="updateCharCounter(this, 'vd-char-counter', 500)">{{ "default_voice_design_text"|t(lang) }}</textarea>
        <div id="vd-char-counter" class="char-counter">0/500</div>
        <label>{{ "language"|t(lang) }}</label>
        <select name="lang" class="tts-input-dropdown vd-full-width">
            {% for l in langs %}
            <option value="{{ l }}" {% if l == 'Auto' %}selected{% endif %}>{{ l }}</option>
            {% endfor %}
            <optgroup label="{{ 'chinese_dialects'|t(lang) }}">
                {% for dialect in dialects %}
                <option value="{{ dialect[0] }}">{{ dialect[1] }}</option>
                {% endfor %}
            </optgroup>
        </select>
        <div class="inner-tabs">
            <div class="sub-tab-nav">
                <button type="button" class="sub-tab-btn active" onclick="switchVdInnerTab('create', this)">{{ "preset_create"|t(lang) }}</button>
                <button type="button" class="sub-tab-btn" onclick="switchVdInnerTab('saved', this)">{{ "saved_voices"|t(lang) }}</button>
            </div>
            <div id="vd-tab-create" class="inner-tab-panel">
                <label>{{ "voice_description"|t(lang) }}</label>
                <input type="text" name="instruction" placeholder="{{ 'voice_desc_placeholder'|t(lang) }}" class="vd-instruct-input">
                <div class="voice-preset-tags">
                    <span class="preset-tag voice-preset-tag" onclick="fillVdInstruct(this)">{{ 'loli_voice'|t(lang) }}</span>
                    <span class="preset-tag voice-preset-tag" onclick="fillVdInstruct(this)">{{ 'mature_voice'|t(lang) }}</span>
                    <span class="preset-tag voice-preset-tag" onclick="fillVdInstruct(this)">{{ 'magnetic_male'|t(lang) }}</span>
                    <span class="preset-tag voice-preset-tag" onclick="fillVdInstruct(this)">{{ 'bass_voice'|t(lang) }}</span>
                    <span class="preset-tag voice-preset-tag" onclick="fillVdInstruct(this)">{{ 'youth_voice'|t(lang) }}</span>
                    <span class="preset-tag voice-preset-tag" onclick="fillVdInstruct(this)">{{ 'japanese_sweet'|t(lang) }}</span>
                </div>
                <button type="submit" class="primary-btn generate-btn vd-full-width-btn">{{ "generate_btn"|t(lang) }}</button>
                <div class="vd-shortcut-hint"><span class="kbd">Ctrl+Enter</span></div>
                <div class="vd-flex-row">
                    <input type="text" name="save_name" placeholder="{{ 'save_voice_name'|t(lang) }}" class="vd-save-name-input">
                    <button type="button" class="secondary-btn icon-btn vd-save-btn" hx-post="/api/persona/save" hx-target="#vd-status" hx-swap="innerHTML">{{ "save_persona"|t(lang) }}</button>
                </div>
            </div>
            <div id="vd-tab-saved" class="inner-tab-panel" style="display:none;">
                <label>{{ "select_voice"|t(lang) }}</label>
                <select name="persona_name" class="tts-input-dropdown vd-full-width">
                    {% for p in persona_list %}
                    <option value="{{ p }}">{{ p }}</option>
                    {% endfor %}
                </select>
                <div id="vd-persona-desc" class="vd-persona-desc"></div>
                <div class="vd-flex-row">
            <button type="button" class="secondary-btn" hx-get="/api/persona/list" hx-target="select[name=persona_name]" hx-swap="innerHTML">{{ "refresh_list"|t(lang) }}</button>
            <button type="button" class="primary-btn" onclick="submitWithPersona()">{{ "use_selected_voice"|t(lang) }}</button>
            <button type="button" class="primary-btn stream-btn" onclick="submitStreaming()">{{ "stream_generate"|t(lang) }}</button>
        </div>
            </div>
        </div>
    </form>
</div>
<div class="card">
    <div class="card-header">
        <span class="card-header-icon" style="display:inline-flex !important;align-items:center !important;justify-content:center !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C6EF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></span>
        <h3 class="card-header-title">{{ "result_audio"|t(lang) }}</h3>
    </div>
    <div id="vd-result">
        <div id="vd-spinner" class="htmx-indicator" style="display:none;text-align:center;padding:24px;">
            <div class="tts-loading-spinner vd-spinner-centered"></div>
            <div class="tts-loading-text">{{ "generating"|t(lang) }}</div>
        </div>
        <div class="status-message" id="vd-status"></div>
    </div>
    <audio class="tts-audio-player vd-audio-hidden" id="vd-audio" controls></audio>
</div>
<script>
(function(){
    window.fillVdInstruct = function(el) {
        var input = document.querySelector('#vd-form input[name=instruct]');
        if (input) { input.value = el.textContent; input.focus(); }
        document.querySelectorAll('#vd-tab-create .preset-tag').forEach(function(t){ t.classList.remove('preset-tag-active'); });
        el.classList.add('preset-tag-active');
    };
    window.switchVdInnerTab = function(tab, btn) {
        document.querySelectorAll('#vd-form .inner-tab-panel').forEach(function(p){ p.style.display = 'none'; });
        document.querySelectorAll('#vd-form .sub-tab-btn').forEach(function(b){ b.classList.remove('active'); });
        document.getElementById('vd-tab-' + tab).style.display = '';
        btn.classList.add('active');
    };
    window.setVdMode = function(mode) {
        var form = document.getElementById('vd-form');
        if (form) {
            form.querySelector('input[name=mode]').value = mode;
            if (mode === 'voice_clone') {
                form.setAttribute('hx-post', '/api/generate/voxcpm_clone');
            } else {
                form.setAttribute('hx-post', '/api/generate/voxcpm_design');
            }
        }
    };

    // Submit form using selected persona for voice cloning
    window.submitWithPersona = function() {
        var form = document.getElementById('vd-form');
        if (form) {
            // Switch to clone mode
            form.querySelector('input[name=mode]').value = 'voice_clone';
            form.setAttribute('hx-post', '/api/generate/voxcpm_clone');
            // Trigger HTMX submission
            htmx.trigger(form, 'submit');
        }
    };

    // Streaming generation - generates audio chunks progressively
    window.submitStreaming = async function() {
        var form = document.getElementById('vd-form');
        if (!form) return;

        var text = form.querySelector('textarea[name=text]').value;
        var personaName = form.querySelector('select[name=persona_name]').value;

        if (!text.trim()) {
            document.getElementById('vd-status').innerHTML = '<div class="tts-error-block"><div class="error-title">{{ "gen_failed"|t(lang) }}</div><div class="error-message">{{ "text_empty"|t(lang) }}</div></div>';
            return;
        }

        // Show streaming UI
        var statusEl = document.getElementById('vd-status');
        var audioEl = document.getElementById('vd-audio');
        statusEl.innerHTML = '<div class="streaming-container"><div class="streaming-header">{{ "streaming_gen"|t(lang) }}</div><div class="streaming-progress"><div class="streaming-bar"><div class="streaming-fill"></div></div><span class="streaming-percent">0%</span></div><div class="streaming-log"></div></div>';

        // Start SSE connection
        const formData = new FormData();
        formData.append('text', text);
        formData.append('persona_name', personaName);

        try {
            const response = await fetch('/api/generate/streaming_audio', {
                method: 'POST',
                body: formData
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let audioChunks = [];
            let currentChunkData = null;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    if (line.startsWith('event: audio_chunk')) {
                        // New chunk arriving - collect next line as chunk data
                        const dataLine = lines[i + 1];
                        if (dataLine && dataLine.startsWith('data: ')) {
                            currentChunkData = dataLine.replace('data: ', '');
                        }
                    } else if (line.startsWith('event: complete')) {
                        // Generation complete - assemble and play
                        if (audioChunks.length > 0) {
                            // For now, just show success since actual streaming needs a different approach
                            // The backend sends raw audio data which we need to handle differently
                        }
                        statusEl.querySelector('.streaming-header').textContent = '{{ "stream_complete"|t(lang) }}';
                        statusEl.querySelector('.streaming-fill').style.width = '100%';
                        statusEl.querySelector('.streaming-percent').textContent = '100%';
                        setTimeout(() => {
                            statusEl.innerHTML = '<div class="tts-success-block">{{ "stream_complete_msg"|t(lang) }}</div>';
                        }, 2000);
                        break;
                    } else if (line.startsWith('event: error')) {
                        const errorMsg = lines[i + 1]?.replace('data: ', '') || '{{ "unknown_error"|t(lang) }}';
                        statusEl.innerHTML = '<div class="tts-error-block"><div class="error-title">{{ "gen_failed"|t(lang) }}</div><div class="error-message">' + errorMsg + '</div></div>';
                        break;
                    }
                }
            }
        } catch (err) {
            statusEl.innerHTML = '<div class="tts-error-block"><div class="error-title">{{ "gen_failed"|t(lang) }}</div><div class="error-message">' + err.message + '</div></div>';
        }
    };
    window.updateCharCounter = function(textarea, counterId, maxLen) {
        var counter = document.getElementById(counterId);
        var submitBtn = document.querySelector('.primary-btn[type="submit"]');
        if (counter) {
            var len = textarea.value.length;
            var segments = Math.ceil(len / maxLen);
            
            // Build counter text with segment info when approaching/exceeding limit
            var counterText = len + '/' + maxLen;
            if (len > maxLen) {
                counterText += ' ({{ "will_split"|t(lang) }}' + segments + '{{ "segments"|t(lang) }})';
            } else if (len > maxLen * 0.8) {
                var remaining = maxLen - len;
                counterText += ' ({{ "remaining"|t(lang) }}' + remaining + '{{ "chars"|t(lang) }})';
            }
            
            counter.textContent = counterText;
            counter.classList.remove('warning', 'danger');
            if (len > maxLen) {
                counter.classList.add('warning');  // Use warning instead of danger for long text
                if (submitBtn) submitBtn.disabled = false;  // Allow submit for segmented generation
            } else if (len > maxLen * 0.8) {
                counter.classList.add('warning');
                if (submitBtn) submitBtn.disabled = false;
            } else {
                if (submitBtn) submitBtn.disabled = false;
            }
        }
    };

    // ISSUE 2 FIX: Initialize character counter on page load
    var textarea = document.querySelector('#vd-form textarea[name=text]');
    if (textarea) {
        updateCharCounter(textarea, 'vd-char-counter', 500);
    }

    // ISSUE 1 FIX: Save/restore selected voice tone from sessionStorage
    var personaSelect = document.querySelector('#vd-tab-saved select[name=persona_name]');
    if (personaSelect) {
        var savedPersona = sessionStorage.getItem('vd_selected_persona');
        if (savedPersona) {
            personaSelect.value = savedPersona;
        }
        personaSelect.addEventListener('change', function() {
            sessionStorage.setItem('vd_selected_persona', this.value);
        });
    }

    // Loading state for generate button
    var form = document.getElementById('vd-form');
    var submitBtn = form.querySelector('button[type="submit"]');
    var originalText = submitBtn.innerHTML;

    form.addEventListener('submit', function(e) {
        var textarea = form.querySelector('textarea[name="text"]');
        if (textarea && !textarea.value.trim()) {
            e.preventDefault();
            var statusEl = document.getElementById('vd-status');
            if (statusEl) {
                statusEl.className = 'status-message error';
                statusEl.textContent = '{{ "enter_text"|t(lang) }}';
            }
            return false;
        }
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner" style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px;vertical-align:middle;"></span>{{ "generating"|t(lang) }}';
    });

    // Reset when HTMX request completes
    document.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.target && evt.detail.target.id === 'vd-result') {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    });

    document.getElementById('vd-form').addEventListener('htmx:afterRequest', function(e) {
        if (e.detail.successful) {
            var audioEl = document.getElementById('vd-audio');
            var audioSrc = document.querySelector('#vd-result audio');
            if (audioSrc) {
                audioEl.src = audioSrc.src;
                audioEl.style.display = '';
                try { audioEl.play(); } catch(ex) {}
            }
        }
    });
})();
</script>
