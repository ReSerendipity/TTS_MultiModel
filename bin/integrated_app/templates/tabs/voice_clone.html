<style>
    /* Voice Clone Tab Styles */
    .vc-persona-desc {
        margin-top: 8px;
        font-size: var(--text-sm);
        color: var(--text-secondary);
    }
    .vc-spacer-top-sm { margin-top: 8px; }
    .vc-spacer-top-md { margin-top: 12px; }
    .vc-full-width { width: 100%; }
    .vc-hidden { display: none; }

    .vc-file-input {
        width: 100%;
        margin-bottom: 8px;
    }

    .vc-submit-btn {
        width: 100%;
    }

    /* Advanced Params */
    .advanced-params {
        margin-top: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        overflow: hidden;
    }
    .advanced-params summary {
        padding: 10px 14px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
        background: var(--bg-tertiary);
    }
    .advanced-params-body {
        padding: 12px 14px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }
    .vc-param-range {
        width: 100%;
    }
    .vc-param-value {
        color: var(--primary-light);
        font-weight: 700;
        font-size: 13px;
    }
    .vc-checkbox-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        margin-top: 0;
    }

    /* Save Row */
    .vc-save-row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
    }
    .vc-save-input {
        flex: 3;
    }
    .vc-save-btn {
        flex: 1;
    }

    /* Textarea auto-resize */
    .vc-auto-resize {
        resize: vertical;
        overflow-y: auto;
        min-height: 60px;
        max-height: 400px;
        line-height: 1.6;
        width: 100% !important;
        box-sizing: border-box !important;
        max-width: none !important;
        display: block !important;
    }

    /* Character counter */
    .vc-char-counter {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 6px;
        margin-bottom: 2px;
        padding: 4px 8px;
        background: rgba(139, 92, 246, 0.05);
        border-radius: 4px;
        white-space: nowrap;
    }
    .vc-char-counter.warning { color: #f59e0b; font-weight: 600; }
    .vc-char-counter .counter-main {
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }
    .vc-char-counter .counter-segments {
        color: var(--accent-primary);
        font-weight: 600;
    }
    .vc-char-counter .counter-detail {
        font-size: 11px;
        color: var(--text-muted);
    }

    /* Micro counter styles - 字符计数器状态样式 */
    .vc-char-counter.micro-counter-ok {
        background: rgba(16, 185, 129, 0.1);
        color: #10B981;
        border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .vc-char-counter.micro-counter-warn {
        background: rgba(245, 158, 11, 0.1);
        color: #F59E0B;
        border: 1px solid rgba(245, 158, 11, 0.2);
    }
    .vc-char-counter.micro-counter-danger {
        background: rgba(239, 68, 68, 0.1);
        color: #EF4444;
        border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .vc-char-counter.micro-counter-empty {
        background: rgba(139, 92, 246, 0.08);
        color: var(--text-secondary);
        border: 1px solid rgba(139, 92, 246, 0.15);
    }
    .micro-counter-check {
        display: inline-flex;
        align-items: center;
        margin-left: 4px;
    }
    .micro-counter-check svg {
        width: 14px;
        height: 14px;
    }

    /* Micro quality badge - 质量指示器样式 */
    .micro-quality-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 500;
        margin-top: 4px;
    }
    .micro-quality-badge svg {
        width: 14px;
        height: 14px;
    }
    .micro-quality-high {
        background: rgba(16, 185, 129, 0.15);
        color: #10B981;
        border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .micro-quality-medium {
        background: rgba(245, 158, 11, 0.15);
        color: #F59E0B;
        border: 1px solid rgba(245, 158, 11, 0.3);
    }
    .micro-quality-low {
        background: rgba(239, 68, 68, 0.15);
        color: #EF4444;
        border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* Spinner */
    .vc-spinner-center {
        display: none;
        text-align: center;
        padding: 24px;
    }
    .vc-spinner-icon {
        margin: 0 auto 8px;
    }

    /* Mobile responsive */
    @media (max-width: 640px) {
        .advanced-params-body {
            grid-template-columns: 1fr !important;
        }
    }
</style>

<div class="card">
    <div class="card-header">
        <span class="card-header-icon" style="display:inline-flex !important;align-items:center !important;justify-content:center !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C6EF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></span>
        <h3 class="card-header-title">{{ "tab_voice_clone"|t(lang) }}</h3>
    </div>
    <div style="padding:0 16px 12px;font-size:13px;color:var(--text-muted);">{{ "voice_clone_desc"|t(lang) }}</div>
    <form id="vc-form" hx-post="/api/generate/voxcpm_clone" hx-target="#vc-result" hx-swap="innerHTML" hx-indicator="#vc-spinner" hx-encoding="multipart/form-data">
        <input type="hidden" name="mode" value="voxcpm_clone">
        <label>{{ "synthesis_text"|t(lang) }}</label>
        <textarea name="text" class="tts-input-textarea vc-auto-resize" rows="3" placeholder="{{ 'default_clone_text'|t(lang) }}" oninput="updateVcCharCounter(this); autoResizeTextarea(this)"></textarea>
        <div id="vc-char-counter" class="vc-char-counter">0/{{ engine_max_total_chars }}</div>
        <span id="vc-quality-badge" class="micro-quality-badge" style="display:none;"></span>
        <label>{{ "language"|t(lang) }}</label>
        <select name="lang" class="tts-input-dropdown">
            {% for l in langs %}
            <option value="{{ l }}" {% if l == 'Auto' %}selected{% endif %}>{{ l }}</option>
            {% endfor %}
            <optgroup label="{{ 'chinese_dialects'|t(lang) }}">
                {% for dialect in dialects %}
                <option value="{{ dialect[0] }}">{{ dialect[1] }}</option>
                {% endfor %}
            </optgroup>
        </select>
        <div class="inner-tabs">
            <div class="sub-tab-nav">
                <button type="button" class="sub-tab-btn active" onclick="switchVcInnerTab('saved', this)">{{ "saved_voices"|t(lang) }}</button>
                <button type="button" class="sub-tab-btn" onclick="switchVcInnerTab('upload', this)">{{ "upload_reference"|t(lang) }}</button>
            </div>
            <div id="vc-tab-saved" class="inner-tab-panel">
                <label>{{ "select_voice"|t(lang) }}</label>
                <select name="persona_name" class="tts-input-dropdown">
                    {% if not persona_list %}
                    <option value="" disabled selected>{{ "no_voice_placeholder"|t(lang) }}</option>
                    {% endif %}
                    {% for p in persona_list %}
                    <option value="{{ p }}">{{ p }}</option>
                    {% endfor %}
                </select>
                <div id="vc-persona-desc" class="vc-persona-desc"></div>
                <div class="vc-spacer-top-sm">
                    <button type="button" class="secondary-btn" hx-get="/api/persona/list" hx-target="select[name=persona_name]" hx-swap="innerHTML">{{ "refresh_list"|t(lang) }}</button>
                </div>
            </div>
            <div id="vc-tab-upload" class="inner-tab-panel vc-hidden">
                <label>{{ "ref_audio"|t(lang) }}</label>
                <input type="file" name="ref_audio_path" accept=".wav,.mp3,.flac,.ogg,.m4a,audio/*" class="vc-file-input">
                <div class="file-upload-info" style="margin-top:8px;font-size:12px;color:var(--text-muted);">
                    <span id="selected-filename">{{ "no_file_selected"|t(lang) }}</span>
                    <span style="margin-left:12px;">{{ "supported_formats"|t(lang) }}</span>
                </div>
                <label>{{ "ref_text"|t(lang) }}</label>
                <textarea name="ref_text" class="tts-input-textarea" rows="2" placeholder="{{ 'ref_text_placeholder'|t(lang) }}"></textarea>
                <label style="margin-top:8px;">{{ "control_instruction"|t(lang) }} <span style="font-size:11px;color:var(--text-muted);font-weight:400;">({{ 'optional'|t(lang) }})</span></label>
                <input type="text" name="instruction" class="tts-input-textbox" placeholder="{{ 'instruction_placeholder'|t(lang) }}" style="width:100%;">
            </div>
        </div>
        <button type="submit" class="primary-btn generate-btn vc-submit-btn">{{ "clone_btn"|t(lang) }}</button>
        <details class="advanced-params">
            <summary>{{ "advanced_params"|t(lang) }}</summary>
            <div class="advanced-params-body">
                <div>
                    <label title="{{ 'tooltip_cfg'|t(lang) }}">{{ "cfg_value"|t(lang) }} <span style="cursor:help;color:var(--text-muted);">&#9432;</span></label>
                    <input type="range" name="cfg_value" min="0.1" max="10" step="0.1" value="2.0" class="vc-param-range" oninput="document.getElementById('vc-cfg-val').textContent=this.value">
                    <span id="vc-cfg-val" class="vc-param-value">2.0</span>
                </div>
                <div>
                    <label title="{{ 'tooltip_steps'|t(lang) }}">{{ "inference_steps"|t(lang) }} <span style="cursor:help;color:var(--text-muted);">&#9432;</span></label>
                    <input type="range" name="inference_timesteps" min="1" max="30" step="1" value="10" class="vc-param-range" oninput="document.getElementById('vc-step-val').textContent=this.value">
                    <span id="vc-step-val" class="vc-param-value">10</span>
                </div>
                <div>
                    <label class="vc-checkbox-label">
                        <input type="checkbox" name="normalize" checked>
                        <span title="{{ 'tooltip_normalize'|t(lang) }}">{{ "text_normalize"|t(lang) }} <span style="cursor:help;color:var(--text-muted);">&#9432;</span></span>
                    </label>
                </div>
                <div>
                    <label class="vc-checkbox-label">
                        <input type="checkbox" name="denoise" checked>
                        <span title="{{ 'tooltip_denoise'|t(lang) }}">{{ "denoise"|t(lang) }} <span style="cursor:help;color:var(--text-muted);">&#9432;</span></span>
                    </label>
                </div>
            </div>
        </details>
        <div class="vc-save-row">
            <input type="text" name="save_name" placeholder="{{ 'save_voice_name'|t(lang) }}" class="vc-save-input">
            <button type="button" class="secondary-btn icon-btn vc-save-btn" hx-post="/api/persona/save" hx-target="#vc-status" hx-swap="innerHTML">{{ "save_persona"|t(lang) }}</button>
        </div>
    </form>
</div>
<div class="card">
    <div class="card-header">
        <span class="card-header-icon" style="display:inline-flex !important;align-items:center !important;justify-content:center !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C6EF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></span>
        <h3 class="card-header-title">{{ "clone_result"|t(lang) }}</h3>
    </div>
    <div id="vc-result" aria-live="polite">
        <div id="vc-spinner" class="htmx-indicator vc-spinner-center" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="{{ 'generating'|t(lang) }}">
            <div class="tts-loading-spinner vc-spinner-icon"></div>
            <div class="tts-loading-text">{{ "cloning"|t(lang) }}</div>
        </div>
        <div class="status-message" id="vc-status"></div>
    </div>
    <audio class="tts-audio-player vc-full-width" id="vc-audio" controls style="display:none;"></audio>
    <details class="pp-section" id="vc-pp-section" style="display:none;margin-top:8px;border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;">
        <summary style="cursor:pointer;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text-secondary);background:var(--bg-tertiary);">{{ "post_processing"|t(lang) }}</summary>
        <div style="padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;">
            <div>
                <label style="font-size:12px;">{{ "speed_factor"|t(lang) }}</label>
                <div style="display:flex;align-items:center;gap:6px;">
                    <input type="range" id="vc-pp-tempo" min="0.5" max="2.0" step="0.1" value="1.0" style="flex:1;" oninput="document.getElementById('vc-pp-tempo-val').textContent=this.value">
                    <span id="vc-pp-tempo-val" style="font-size:12px;min-width:28px;text-align:right;">1.0</span>
                </div>
            </div>
            <div>
                <label style="font-size:12px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;">
                    <input type="checkbox" id="vc-pp-enhance">
                    {{ "voice_enhancement"|t(lang) }}
                </label>
            </div>
        </div>
        <div style="padding:0 12px 10px;text-align:right;">
            <button type="button" class="secondary-btn" style="font-size:12px;padding:4px 14px;" onclick="vcReprocess()">{{ "reprocess"|t(lang) }}</button>
        </div>
    </details>
</div>
<script>
(function(){
    // Custom confirm dialog (replaces native confirm())
    window.showConfirmDialog = function(message, onConfirm) {
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
        var dialog = document.createElement('div');
        dialog.style.cssText = 'background:var(--bg-primary,#1a1a2e);border-radius:12px;padding:24px;max-width:400px;width:90%;text-align:center;';
        dialog.innerHTML = '<p style="color:var(--text-primary);margin-bottom:20px;font-size:14px;">' + message + '</p><div style="display:flex;gap:12px;justify-content:center;"><button id="confirm-cancel" style="padding:8px 20px;border-radius:8px;border:1px solid var(--border-subtle);background:var(--bg-tertiary);color:var(--text-primary);cursor:pointer;">' + (window.I18N && window.I18N['cancel'] || '{{ "cancel"|t(lang) }}') + '</button><button id="confirm-ok" style="padding:8px 20px;border-radius:8px;border:none;background:#10B981;color:#fff;cursor:pointer;">' + (window.I18N && window.I18N['confirm'] || '{{ "confirm"|t(lang) }}') + '</button></div>';
        overlay.appendChild(dialog);
        document.body.appendChild(overlay);
        document.getElementById('confirm-cancel').onclick = function() { overlay.remove(); };
        document.getElementById('confirm-ok').onclick = function() { overlay.remove(); onConfirm(); };
        overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
    };

    var vcForm = document.getElementById('vc-form');
    var submitBtn = vcForm ? vcForm.querySelector('button[type="submit"]') : null;
    var originalBtnText = submitBtn ? submitBtn.innerHTML : '';

    window.switchVcInnerTab = function(tab, btn) {
        document.querySelectorAll('#vc-form .inner-tab-panel').forEach(function(p){ p.style.display = 'none'; });
        document.querySelectorAll('#vc-form .sub-tab-btn').forEach(function(b){ b.classList.remove('active'); });
        document.getElementById('vc-tab-' + tab).style.display = '';
        btn.classList.add('active');
    };
    window.autoResizeTextarea = window.autoResizeTextarea || function(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 400) + 'px';
    };

    window.updateVcCharCounter = function(textarea) {
        var SPLIT_MAX_CHARS = {{ gen_split_max_chars }};
        var ENGINE_MAX_CHARS = {{ engine_max_total_chars }};
        var counter = document.getElementById('vc-char-counter');
        var qualityBadge = document.getElementById('vc-quality-badge');
        if (counter) {
            var len = textarea.value.length;
            var segments = len > 0 ? Math.ceil(len / SPLIT_MAX_CHARS) : 0;

            var counterMain = '<span class="counter-main">' + len + '/' + ENGINE_MAX_CHARS + '</span>';
            var counterDetail = '';
            counter.classList.remove('warning', 'micro-counter-ok', 'micro-counter-warn', 'micro-counter-danger', 'micro-counter-empty');

            if (len > ENGINE_MAX_CHARS) {
                counterDetail = '<span class="counter-segments" style="color:#ef4444;">{{ "text_too_long"|t(lang) }}</span>';
                counter.classList.add('micro-counter-danger');
            } else if (len > SPLIT_MAX_CHARS) {
                counterDetail = '<span class="counter-segments">{{ "will_split"|t(lang) }}' + segments + '{{ "segments"|t(lang) }}</span>';
                counter.classList.add('micro-counter-warn');
            } else if (len > 0) {
                counterDetail = '<span class="counter-detail">{{ "will_split"|t(lang) }}' + segments + '{{ "segments"|t(lang) }}</span>';
                counter.classList.add('micro-counter-ok');
                counterDetail += '<span class="micro-counter-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>';
            } else {
                counter.classList.add('micro-counter-empty');
            }

            counter.innerHTML = counterMain + (counterDetail ? ' ' + counterDetail : '');
            counter.classList.remove('warning');
            if (len >= ENGINE_MAX_CHARS) counter.classList.add('warning');
            if (submitBtn) submitBtn.disabled = false;

            if (qualityBadge) {
                if (len === 0) {
                    qualityBadge.style.display = 'none';
                } else if (len <= SPLIT_MAX_CHARS) {
                    qualityBadge.style.display = 'inline-flex';
                    qualityBadge.className = 'micro-quality-badge micro-quality-high';
                    qualityBadge.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ' + '{{ "quality_high"|t(lang) }}';
                } else if (len <= SPLIT_MAX_CHARS * 3) {
                    qualityBadge.style.display = 'inline-flex';
                    qualityBadge.className = 'micro-quality-badge micro-quality-medium';
                    qualityBadge.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> ' + '{{ "quality_split"|t(lang) }}';
                } else {
                    qualityBadge.style.display = 'inline-flex';
                    qualityBadge.className = 'micro-quality-badge micro-quality-low';
                    qualityBadge.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> ' + '{{ "quality_low"|t(lang) }}';
                }
            }
        }
    };

    window.getVcSegmentInfo = function() {
        var form = document.getElementById('vc-form');
        if (!form) return null;
        var textarea = form.querySelector('textarea[name=text]');
        if (!textarea || !textarea.value.trim()) return null;
        var len = textarea.value.length;
        var SPLIT_MAX_CHARS = {{ gen_split_max_chars }};
        var segments = Math.ceil(len / SPLIT_MAX_CHARS);
        return { textLength: len, segmentCount: segments, maxLen: SPLIT_MAX_CHARS };
    };

    // Frontend validation: prevent empty text, reference audio check, segment confirmation, and anti-duplicate-submit
    document.getElementById('vc-form').addEventListener('submit', function(e) {
        var textarea = this.querySelector('textarea[name="text"]');
        if (textarea && !textarea.value.trim()) {
            e.preventDefault();
            var statusEl = document.getElementById('vc-status');
            if (statusEl) {
                statusEl.className = 'status-message error';
                statusEl.textContent = '{{ "enter_text"|t(lang) }}';
            }
            return false;
        }

        // #4 Reference audio validation: check if upload tab is active and no file selected
        var uploadTab = document.getElementById('vc-tab-upload');
        var savedTab = document.getElementById('vc-tab-saved');
        if (uploadTab && uploadTab.style.display !== 'none') {
            var fileInput = this.querySelector('input[type="file"][name="ref_audio_path"]');
            if (fileInput && (!fileInput.files || fileInput.files.length === 0)) {
                e.preventDefault();
                var statusEl2 = document.getElementById('vc-status');
                if (statusEl2) {
                    statusEl2.className = 'status-message error';
                    statusEl2.textContent = '{{ "select_ref_audio"|t(lang) }}';
                }
                return false;
            }
        }

        var info = window.getVcSegmentInfo();
        if (info && info.segmentCount > 1) {
            e.preventDefault();
            var msg = '{{ "confirm_split"|t(lang) }}' + info.segmentCount + '{{ "segments"|t(lang) }}<br>' +
                '{{ "total_chars"|t(lang) }}' + info.textLength + '{{ "chars"|t(lang) }}<br>' +
                '{{ "max_chars_per_seg"|t(lang) }}' + info.maxLen + '{{ "chars"|t(lang) }}<br><br>' +
                '{{ "confirm_continue"|t(lang) }}';
            showConfirmDialog(msg, function() {
                // Re-submit after confirmation
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<span class="spinner" style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px;vertical-align:middle;"></span>{{ "generating"|t(lang) }}';
                }
                document.getElementById('vc-form').submit();
            });
            return false;
        }

        // #1 & #12 Anti-duplicate-submit: disable button and show spinner
        if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner" style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px;vertical-align:middle;"></span>{{ "generating"|t(lang) }}';
        }
    });

    // #1 Reset button state when HTMX request completes
    document.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.target && evt.detail.target.id === 'vc-result') {
            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        }
    });

    document.getElementById('vc-form').addEventListener('htmx:afterSettle', function(e) {
        if (e.detail.successful) {
            var audioEl = document.getElementById('vc-audio');
            var audioSrc = document.querySelector('#vc-result audio');
            if (audioSrc) {
                if (window.globalAudioPlayer) {
                    var filename = audioSrc.src.split('/').pop().split('?')[0];
                    window.globalAudioPlayer.play(audioSrc.src, filename);
                }
                audioEl.style.display = '';
            }
            // Show post-processing section when audio is available
            var wrapper = document.querySelector('#vc-result [data-audio-filename]');
            var ppSection = document.getElementById('vc-pp-section');
            if (wrapper && ppSection) {
                ppSection.style.display = '';
            }
        }
    });

    // Post-processing re-process
    window.vcReprocess = async function() {
        var resultEl = document.getElementById('vc-result');
        if (!resultEl) return;
        var wrapper = resultEl.querySelector('[data-audio-filename]');
        if (!wrapper) return;
        var audioPath = wrapper.getAttribute('data-audio-filename');
        var tempo = document.getElementById('vc-pp-tempo').value;
        var enhance = document.getElementById('vc-pp-enhance').checked ? 'true' : 'false';
        var statusEl = document.getElementById('vc-status');
        statusEl.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">' + ((window.I18N && window.I18N['processing']) || 'Processing...') + '</div>';
        try {
            var resp = await fetch('/api/generate/post-process', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'audio_path=' + encodeURIComponent(audioPath) + '&tempo_factor=' + tempo + '&voice_enhancement=' + enhance + '&target_lufs=-16.0'
            });
            var html = await resp.text();
            resultEl.innerHTML = html;
            var audioSrc = resultEl.querySelector('audio');
            var audioEl = document.getElementById('vc-audio');
            if (audioSrc && audioEl) {
                if (window.globalAudioPlayer) {
                    var filename2 = audioSrc.src.split('/').pop().split('?')[0];
                    window.globalAudioPlayer.play(audioSrc.src, filename2);
                }
                audioEl.style.display = '';
            }
        } catch(err) {
            statusEl.innerHTML = '<div class="tts-error-block"><div class="error-message">' + err.message + '</div></div>';
        }
    };

    // File upload feedback
    var fileInput = document.querySelector('input[type="file"][name="ref_audio_path"]');
    var filenameSpan = document.getElementById('selected-filename');
    var MAX_SIZE = 100 * 1024 * 1024;

    if (fileInput && filenameSpan) {
        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                var file = this.files[0];
                var sizeMB = (file.size / 1024 / 1024).toFixed(2);
                if (file.size > MAX_SIZE) {
                    filenameSpan.textContent = '{{ "file_too_large"|t(lang) }}' + sizeMB + 'MB ({{ "max_size"|t(lang) }})';
                    filenameSpan.style.color = '#ef4444';
                    this.value = '';
                } else {
                    filenameSpan.textContent = file.name + ' (' + sizeMB + 'MB)';
                    filenameSpan.style.color = 'var(--text-secondary)';
                }
            } else {
                filenameSpan.textContent = '{{ "no_file_selected"|t(lang) }}';
                filenameSpan.style.color = 'var(--text-muted)';
            }
        });
    }

    // Initialize character counter and textarea height on page load
    var vcTextarea = document.querySelector('#vc-form textarea[name=text]');
    if (vcTextarea) {
        updateVcCharCounter(vcTextarea);
        autoResizeTextarea(vcTextarea);
    }
})();
</script>
