<div class="card">
    <div class="card-header">
        <span class="card-header-icon" style="display:inline-flex !important;align-items:center !important;justify-content:center !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C6EF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><line x1="4" x2="4" y1="21" y2="14"/><line x1="4" x2="4" y1="10" y2="3"/><line x1="12" x2="12" y1="21" y2="12"/><line x1="12" x2="12" y1="8" y2="3"/><line x1="20" x2="20" y1="21" y2="16"/><line x1="20" x2="20" y1="12" y2="3"/><line x1="1" x2="7" y1="14" y2="14"/><line x1="9" x2="15" y1="8" y2="8"/><line x1="17" x2="23" y1="16" y2="16"/></svg></span>
        <h3 class="card-header-title">{{ "tab_ultimate_clone"|t(lang) }}</h3>
        <span class="card-header-badge">{{ "advanced_params"|t(lang) }}</span>
    </div>
    <div style="padding:0 16px 12px;font-size:13px;color:var(--text-muted);">{{ "ultimate_clone_desc"|t(lang) }}</div>
    <form id="uc-form" hx-post="/api/generate/voxcpm_ultimate" hx-target="#uc-result" hx-swap="innerHTML" hx-indicator="#uc-spinner" hx-encoding="multipart/form-data">
        <label>{{ "synthesis_text"|t(lang) }}</label>
        <textarea name="text" class="tts-input-textarea uc-auto-resize" rows="4" placeholder="{{ 'enter_text_placeholder'|t(lang) }}" oninput="updateUcCharCounter(this); autoResizeTextarea(this)"></textarea>
        <div id="uc-char-counter" class="uc-char-counter">0/200</div>
        <label style="margin-top:8px;">{{ "language"|t(lang) }}</label>
        <select name="lang" class="tts-input-dropdown" style="width:100%;">
            {% for l in langs %}
            <option value="{{ l }}" {% if l == 'Auto' %}selected{% endif %}>{{ l }}</option>
            {% endfor %}
            <optgroup label="{{ 'chinese_dialects'|t(lang) }}">
                {% for dialect in dialects %}
                <option value="{{ dialect[0] }}">{{ dialect[1] }}</option>
                {% endfor %}
            </optgroup>
        </select>

        <div style="margin:16px 0;">
            <label>{{ "ref_audio"|t(lang) }}</label>
            <div class="inner-tabs" style="margin-top:8px;">
                <div class="sub-tab-nav">
                    <button type="button" class="sub-tab-btn active" onclick="switchUcRefTab('saved', this)">{{ "saved_voices"|t(lang) }}</button>
                    <button type="button" class="sub-tab-btn" onclick="switchUcRefTab('upload', this)">{{ "upload_reference"|t(lang) }}</button>
                </div>
                <div id="uc-tab-saved" class="inner-tab-panel">
                    <select name="persona_name" class="tts-input-dropdown" style="width:100%;margin-bottom:8px;">
                        {% for p in persona_list %}
                        <option value="{{ p }}">{{ p }}</option>
                        {% endfor %}
                    </select>
                    <div style="display:flex;gap:8px;">
                        <button type="button" class="secondary-btn" hx-get="/api/persona/list" hx-target="select[name=persona_name]" hx-swap="innerHTML" style="flex:1;">{{ "refresh_list"|t(lang) }}</button>
                    </div>
                </div>
                <div id="uc-tab-upload" class="inner-tab-panel" style="display:none;">
                    <input type="file" name="ref_audio_path" class="tts-input-file" accept=".wav,.mp3,.ogg,.flac" style="width:100%;">
                </div>
            </div>
        </div>

        <details class="advanced-params" style="margin:16px 0;">
            <summary style="cursor:pointer;color:var(--text-secondary);font-size:14px;padding:8px 0;border-bottom:1px solid rgba(139,92,246,0.2);">
                <span data-icon="settings" style="width:16px;height:16px;margin-right:8px;vertical-align:middle;"></span>
                {{ "advanced_params"|t(lang) }}
            </summary>
            <div style="padding:16px 0;">
                <div class="grid-2col" style="gap:16px;">
                    <div>
                        <label title="{{ 'tooltip_cfg'|t(lang) }}">{{ "cfg_value"|t(lang) }} <span style="cursor:help;color:var(--text-muted);">&#9432;</span></label>
                        <div class="param-slider">
                            <input type="range" name="cfg" min="0.1" max="10" step="0.1" value="2.0" oninput="this.nextElementSibling.textContent=this.value">
                            <span class="param-value">2.0</span>
                        </div>
                    </div>
                    <div>
                        <label title="{{ 'tooltip_steps'|t(lang) }}">{{ "inference_steps"|t(lang) }} <span style="cursor:help;color:var(--text-muted);">&#9432;</span></label>
                        <div class="param-slider">
                            <input type="range" name="steps" min="1" max="30" step="1" value="10" oninput="this.nextElementSibling.textContent=this.value">
                            <span class="param-value">10</span>
                        </div>
                    </div>
                    <div>
                        <label title="{{ 'tooltip_denoise'|t(lang) }}">{{ "denoise"|t(lang) }} <span style="cursor:help;color:var(--text-muted);">&#9432;</span></label>
                        <select name="denoise" class="tts-input-dropdown">
                            <option value="true" selected>{{ "denoise_on"|t(lang) }}</option>
                            <option value="false">{{ "denoise_off"|t(lang) }}</option>
                        </select>
                    </div>
                    <div>
                        <label title="{{ 'tooltip_normalize'|t(lang) }}">{{ "text_normalize"|t(lang) }} <span style="cursor:help;color:var(--text-muted);">&#9432;</span></label>
                        <select name="norm" class="tts-input-dropdown">
                            <option value="true" selected>{{ "normalize_on"|t(lang) }}</option>
                            <option value="false">{{ "normalize_off"|t(lang) }}</option>
                        </select>
                    </div>
                    <div style="grid-column: span 2;">
                        <label title="{{ 'tooltip_seed'|t(lang) }}">{{ "random_seed"|t(lang) }} <span style="cursor:help;color:var(--text-muted);">&#9432;</span></label>
                        <div style="display:flex;gap:8px;align-items:center;">
                            <input type="checkbox" name="use_random_seed" id="uc-random-seed" checked style="margin:0;">
                            <label for="uc-random-seed" style="margin:0;cursor:pointer;">{{ "use_random_seed"|t(lang) }}</label>
                        </div>
                        <input type="number" name="seed" id="uc-seed-input" class="tts-input-text" style="margin-top:8px;display:none;" placeholder="{{ 'seed_placeholder'|t(lang) }}" min="0" max="2147483647">
                    </div>
                </div>
            </div>
        </details>

        <div style="margin-top:12px;">
            <label>{{ "control_instruction"|t(lang) }} <span style="font-size:11px;color:var(--text-muted);font-weight:400;">({{ 'optional'|t(lang) }})</span></label>
            <input type="text" name="instruction" class="tts-input-textbox" placeholder="{{ 'instruction_placeholder'|t(lang) }}" style="width:100%;">
        </div>

        <button type="submit" class="primary-btn generate-btn" style="width:100%;">{{ "generate_ultimate"|t(lang) }}</button>
    </form>
</div>
<style>
    .uc-auto-resize {
        resize: none;
        overflow: hidden;
        min-height: 60px;
        max-height: 400px;
        line-height: 1.6;
    }
    .uc-char-counter {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 6px;
        margin-bottom: 2px;
        padding: 4px 8px;
        background: rgba(139, 92, 246, 0.05);
        border-radius: 4px;
        white-space: nowrap;
    }
    .uc-char-counter.warning { color: #f59e0b; font-weight: 600; }
    .uc-char-counter .counter-main { display: inline-flex; align-items: center; gap: 4px; }
    .uc-char-counter .counter-segments { color: var(--accent-primary); font-weight: 600; }
    .uc-char-counter .counter-detail { font-size: 11px; color: var(--text-muted); }
</style>
<div class="card">
    <div class="card-header">
        <span class="card-header-icon" style="display:inline-flex !important;align-items:center !important;justify-content:center !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C6EF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block !important;width:20px !important;height:20px !important;flex-shrink:0 !important;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></span>
        <h3 class="card-header-title">{{ "result_audio"|t(lang) }}</h3>
    </div>
    <div id="uc-result">
        <div id="uc-spinner" class="htmx-indicator" style="display:none;text-align:center;padding:24px;">
            <div class="tts-loading-spinner" style="margin:0 auto 8px;"></div>
            <div class="tts-loading-text">{{ "generating"|t(lang) }}</div>
        </div>
        <div class="status-message" id="uc-status"></div>
    </div>
    <audio class="tts-audio-player" id="uc-audio" controls style="width:100%;display:none;"></audio>
    <details class="pp-section" id="uc-pp-section" style="display:none;margin-top:8px;border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;">
        <summary style="cursor:pointer;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text-secondary);background:var(--bg-tertiary);">{{ "post_processing"|t(lang) }}</summary>
        <div style="padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;">
            <div>
                <label style="font-size:12px;">{{ "speed_factor"|t(lang) }}</label>
                <div style="display:flex;align-items:center;gap:6px;">
                    <input type="range" id="uc-pp-tempo" min="0.5" max="2.0" step="0.1" value="1.0" style="flex:1;" oninput="document.getElementById('uc-pp-tempo-val').textContent=this.value">
                    <span id="uc-pp-tempo-val" style="font-size:12px;min-width:28px;text-align:right;">1.0</span>
                </div>
            </div>
            <div>
                <label style="font-size:12px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;">
                    <input type="checkbox" id="uc-pp-enhance">
                    {{ "voice_enhancement"|t(lang) }}
                </label>
            </div>
        </div>
        <div style="padding:0 12px 10px;text-align:right;">
            <button type="button" class="secondary-btn" style="font-size:12px;padding:4px 14px;" onclick="ucReprocess()">{{ "reprocess"|t(lang) }}</button>
        </div>
    </details>
</div>
<script>
(function(){
    window.autoResizeTextarea = window.autoResizeTextarea || function(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 400) + 'px';
    };

    window.updateUcCharCounter = function(textarea) {
        var SPLIT_MAX_CHARS = 200;
        var counter = document.getElementById('uc-char-counter');
        if (counter) {
            var len = textarea.value.length;
            var segments = len > 0 ? Math.ceil(len / SPLIT_MAX_CHARS) : 0;
            var counterMain = '<span class="counter-main">' + len + '/' + SPLIT_MAX_CHARS + '</span>';
            var counterDetail = '';
            if (len > SPLIT_MAX_CHARS) {
                counterDetail = '<span class="counter-segments">' + '{{ "will_split"|t(lang) }}' + segments + '{{ "segments"|t(lang) }}</span>';
            } else if (len > 0) {
                counterDetail = '<span class="counter-detail">{{ "will_split"|t(lang) }}' + segments + '{{ "segments"|t(lang) }}</span>';
            }
            counter.innerHTML = counterMain + (counterDetail ? ' ' + counterDetail : '');
            counter.classList.remove('warning');
            if (len >= SPLIT_MAX_CHARS || len >= SPLIT_MAX_CHARS * 0.8) counter.classList.add('warning');
        }
    };

    window.getUcSegmentInfo = function() {
        var form = document.getElementById('uc-form');
        if (!form) return null;
        var textarea = form.querySelector('textarea[name=text]');
        if (!textarea || !textarea.value.trim()) return null;
        var len = textarea.value.length;
        return { textLength: len, segmentCount: Math.ceil(len / 200), maxLen: 200 };
    };

    // Frontend validation: prevent empty text submission
    document.getElementById('uc-form').addEventListener('submit', function(e) {
        var textarea = this.querySelector('textarea[name="text"]');
        if (textarea && !textarea.value.trim()) {
            e.preventDefault();
            var statusEl = document.getElementById('uc-status');
            if (statusEl) {
                statusEl.className = 'status-message error';
                statusEl.textContent = '{{ "enter_text"|t(lang) }}';
            }
            return false;
        }

        var info = window.getUcSegmentInfo();
        if (info && info.segmentCount > 1) {
            e.preventDefault();
            var confirmed = confirm(
                '{{ "confirm_split"|t(lang) }}' + info.segmentCount + '{{ "segments"|t(lang) }}\n' +
                '{{ "total_chars"|t(lang) }}' + info.textLength + '{{ "chars"|t(lang) }}\n' +
                '{{ "max_chars_per_seg"|t(lang) }}' + info.maxLen + '{{ "chars"|t(lang) }}\n\n' +
                '{{ "confirm_continue"|t(lang) }}'
            );
            if (!confirmed) return false;
        }
    });
    document.getElementById('uc-form').addEventListener('htmx:afterSettle', function(e){
        if (e.detail.successful) {
            var audioEl = document.getElementById('uc-audio');
            var audioSrc = document.querySelector('#uc-result audio');
            if (audioSrc) {
                if (window.globalAudioPlayer) {
                    var filename = audioSrc.src.split('/').pop().split('?')[0];
                    window.globalAudioPlayer.play(audioSrc.src, filename);
                }
                audioEl.style.display = '';
            }
            // Show post-processing section when audio is available
            var wrapper = document.querySelector('#uc-result [data-audio-filename]');
            var ppSection = document.getElementById('uc-pp-section');
            if (wrapper && ppSection) {
                ppSection.style.display = '';
            }
        }
    });

    var randomSeedCheckbox = document.getElementById('uc-random-seed');
    var seedInput = document.getElementById('uc-seed-input');
    if (randomSeedCheckbox && seedInput) {
        randomSeedCheckbox.addEventListener('change', function(){
            seedInput.style.display = this.checked ? 'none' : '';
        });
    }

    // Switch reference audio tabs
    window.switchUcRefTab = function(tab, btn) {
        document.querySelectorAll('#uc-form .inner-tab-panel').forEach(function(p){ p.style.display = 'none'; });
        document.querySelectorAll('#uc-form .sub-tab-btn').forEach(function(b){ b.classList.remove('active'); });
        document.getElementById('uc-tab-' + tab).style.display = '';
        btn.classList.add('active');
    };

    // Post-processing re-process
    window.ucReprocess = async function() {
        var resultEl = document.getElementById('uc-result');
        if (!resultEl) return;
        var wrapper = resultEl.querySelector('[data-audio-filename]');
        if (!wrapper) return;
        var audioPath = wrapper.getAttribute('data-audio-filename');
        var tempo = document.getElementById('uc-pp-tempo').value;
        var enhance = document.getElementById('uc-pp-enhance').checked ? 'true' : 'false';
        var statusEl = document.getElementById('uc-status');
        statusEl.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">Processing...</div>';
        try {
            var resp = await fetch('/api/generate/post-process', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'audio_path=' + encodeURIComponent(audioPath) + '&tempo_factor=' + tempo + '&voice_enhancement=' + enhance + '&target_lufs=-16.0'
            });
            var html = await resp.text();
            resultEl.innerHTML = html;
            var audioSrc = resultEl.querySelector('audio');
            var audioEl = document.getElementById('uc-audio');
            if (audioSrc && audioEl) {
                if (window.globalAudioPlayer) {
                    var filename2 = audioSrc.src.split('/').pop().split('?')[0];
                    window.globalAudioPlayer.play(audioSrc.src, filename2);
                }
                audioEl.style.display = '';
            }
        } catch(err) {
            statusEl.innerHTML = '<div class="tts-error-block"><div class="error-message">' + err.message + '</div></div>';
        }
    };
})();
</script>
