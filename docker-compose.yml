version: "3.8"

services:
  tts:
    build: .
    ports:
      - "7869:7869"
    volumes:
      - ./pretrained_models:/app/pretrained_models
      - ./outputs:/app/outputs
      - ./personas:/app/personas
      - ./cache:/app/cache
    environment:
      - TTS_AUTO_LOAD_MODEL=1
      - TTS_AUTO_LOAD_ENGINE=voxcpm2
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7869/api/system/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 16G
          cpus: "4.0"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
