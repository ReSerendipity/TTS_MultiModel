<!DOCTYPE html>
<html>
<head>
    <title>SSE Stream Test</title>
</head>
<body>
    <h1>SSE Stream Test</h1>
    <button onclick="testStream()">Test Streaming</button>
    <pre id="output"></pre>

    <script>
        function log(msg) {
            document.getElementById('output').textContent += msg + '\n';
        }

        async function testStream() {
            log('Starting stream test...');
            
            var formData = new FormData();
            formData.append('text', '你好，这是一个测试');
            formData.append('persona_name', '');
            
            var audioChunks = [];
            var totalSegments = 1;
            var currentSegment = 0;
            var sampleRate = 48000;
            
            try {
                const response = await fetch('http://127.0.0.1:7869/api/generate/streaming_sse', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    log('Error: HTTP ' + response.status);
                    return;
                }

                log('Connected, status: ' + response.status);
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let currentEvent = '';
                let currentData = '';

                function processEvent() {
                    if (!currentEvent || !currentData) return;
                    
                    switch (currentEvent) {
                        case 'meta':
                            try {
                                var meta = JSON.parse(currentData);
                                totalSegments = meta.total_segments || 1;
                                sampleRate = meta.sample_rate || 48000;
                                log('Meta: ' + totalSegments + ' segments, ' + sampleRate + 'Hz');
                            } catch (e) {
                                log('Meta parse error: ' + e);
                            }
                            break;

                        case 'progress':
                            try {
                                var prog = JSON.parse(currentData);
                                currentSegment = prog.segment || 0;
                                totalSegments = prog.total || 1;
                                log('Progress: ' + currentSegment + '/' + totalSegments);
                            } catch (e) {
                                log('Progress parse error: ' + e);
                            }
                            break;

                        case 'audio':
                            try {
                                log('Audio event received, data length: ' + currentData.length);
                                // Decode base64 PCM data
                                var binaryString = atob(currentData);
                                var len = binaryString.length;
                                var bytes = new Uint8Array(len);
                                for (var j = 0; j < len; j++) {
                                    bytes[j] = binaryString.charCodeAt(j);
                                }
                                // Create a NEW ArrayBuffer for each chunk
                                var int16Array = new Int16Array(bytes.buffer.slice(0));
                                audioChunks.push(int16Array);
                                log('Audio chunk added, total chunks: ' + audioChunks.length + ', samples: ' + int16Array.length);
                            } catch (e) {
                                log('Audio chunk decode failed: ' + e);
                            }
                            break;

                        case 'done':
                            try {
                                var doneData = JSON.parse(currentData);
                                log('Done event received, filename: ' + doneData.filename);
                                log('Total audio chunks: ' + audioChunks.length);
                                
                                if (audioChunks.length > 0) {
                                    var totalLen = 0;
                                    for (var k = 0; k < audioChunks.length; k++) {
                                        totalLen += audioChunks[k].length;
                                    }
                                    log('Combining ' + audioChunks.length + ' chunks, total samples: ' + totalLen);
                                    
                                    var combined = new Int16Array(totalLen);
                                    var offset = 0;
                                    for (var k = 0; k < audioChunks.length; k++) {
                                        combined.set(audioChunks[k], offset);
                                        offset += audioChunks[k].length;
                                    }
                                    
                                    log('Audio data created: ' + combined.length + ' samples, ' + (combined.length / sampleRate).toFixed(2) + ' seconds');
                                    
                                    // Create WAV blob
                                    var bufLen = combined.length;
                                    var byteLen = bufLen * 2;
                                    var wavBuffer = new ArrayBuffer(44 + byteLen);
                                    var view = new DataView(wavBuffer);
                                    
                                    // WAV header
                                    var writeString = function(offset, str) {
                                        for (var i = 0; i < str.length; i++) {
                                            view.setUint8(offset + i, str.charCodeAt(i));
                                        }
                                    };
                                    writeString(0, 'RIFF');
                                    view.setUint32(4, 36 + byteLen, true);
                                    writeString(8, 'WAVE');
                                    writeString(12, 'fmt ');
                                    view.setUint32(16, 16, true);
                                    view.setUint16(20, 1, true);
                                    view.setUint16(22, 1, true);
                                    view.setUint32(24, sampleRate, true);
                                    view.setUint32(28, sampleRate * 2, true);
                                    view.setUint16(32, 2, true);
                                    view.setUint16(34, 16, true);
                                    writeString(36, 'data');
                                    view.setUint32(40, byteLen, true);
                                    
                                    for (var i = 0; i < bufLen; i++) {
                                        view.setInt16(44 + i * 2, combined[i], true);
                                    }
                                    
                                    var wavBlob = new Blob([wavBuffer], { type: 'audio/wav' });
                                    var url = URL.createObjectURL(wavBlob);
                                    
                                    log('WAV blob created, size: ' + wavBlob.size + ' bytes');
                                    log('URL: ' + url);
                                    
                                    // Create audio element and play
                                    var audio = new Audio(url);
                                    audio.controls = true;
                                    audio.autoplay = true;
                                    document.body.appendChild(audio);
                                    
                                    log('Audio element created and playing!');
                                } else {
                                    log('WARNING: No audio chunks received!');
                                }
                            } catch (e) {
                                log('Done event parse failed: ' + e);
                            }
                            break;

                        case 'error':
                            try {
                                var errData = JSON.parse(currentData);
                                log('Error: ' + errData.message);
                            } catch (e) {
                                log('Error event parse failed');
                            }
                            break;
                    }
                    
                    // Reset event state
                    currentEvent = '';
                    currentData = '';
                }

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();
                        if (line.startsWith('event:')) {
                            if (currentEvent && currentData) {
                                processEvent();
                            }
                            currentEvent = line.substring(6).trim();
                            currentData = '';
                        } else if (line.startsWith('data:')) {
                            var dataValue = line.substring(5).trim();
                            currentData = currentData ? currentData + dataValue : dataValue;
                        } else if (line === '') {
                            if (currentEvent && currentData) {
                                processEvent();
                            }
                        }
                    }
                }
                
                if (currentEvent && currentData) {
                    processEvent();
                }
                
                log('Stream completed!');
            } catch (err) {
                log('Error: ' + err.message);
            }
        }
    </script>
</body>
</html>
