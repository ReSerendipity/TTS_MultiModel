name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check bin/integrated_app/ scripts/

      - name: Run ruff format check
        run: ruff format bin/integrated_app/ scripts/ --check --diff

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Dependency consistency check
        run: python scripts/sync_requirements.py --check

      - name: Run tests with coverage
        env:
          TRANSFORMERS_OFFLINE: "1"
          HF_HUB_OFFLINE: "1"
          MODELSCOPE_OFFLINE: "1"
          CUDA_VISIBLE_DEVICES: ""
        run: |
          pytest tests/ -v --tb=short --cov=bin/integrated_app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=40 \
            -k "not gpu and not cuda and not vram" -m "not integration"

      - name: Run integration tests
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          TRANSFORMERS_OFFLINE: "1"
          HF_HUB_OFFLINE: "1"
          MODELSCOPE_OFFLINE: "1"
          CUDA_VISIBLE_DEVICES: ""
        run: |
          pytest tests/ -v --tb=short -m "integration" || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build (sdist/wheel)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
