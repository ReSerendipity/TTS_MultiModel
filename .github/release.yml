# GitHub auto-generated release notes configuration
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  categories:
    - title: "🚀 New Features"
      labels:
        - "enhancement"
        - "feature"
    - title: "🐛 Bug Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "📝 Documentation"
      labels:
        - "documentation"
        - "docs"
    - title: "🌐 Translations"
      labels:
        - "i18n"
        - "translation"
    - title: "🧪 Testing"
      labels:
        - "test"
        - "testing"
    - title: "🔧 Maintenance"
      labels:
        - "chore"
        - "dependencies"
        - "ci"
        - "build"
    - title: "⚠️ Breaking Changes"
      labels:
        - "breaking-change"
    - title: "📦 Other Changes"
      labels:
        - "*"
