version: "2.0.1"

server:
  host: "127.0.0.1"
  port: 7869
  auto_load_model: true
  # SSL configuration (currently not active - server runs on HTTP)
  # To enable HTTPS, configure uvicorn in clean_launch.py with ssl_certfile/ssl_keyfile
  ssl:
    certfile: "bin/cert.pem"
    keyfile: "bin/key.pem"

models:
  voxcpm2:
    model_path: "pretrained_models/VoxCPM2"
    asr_path: "pretrained_models/SenseVoiceSmall"
    denoiser_path: "pretrained_models/speech_zipenhancer"

generation:
  cfg_value: 2.0
  inference_timesteps: 10
  normalize: true
  denoise: true
  retry_badcase: true
  retry_badcase_max_times: 3
  retry_badcase_ratio_threshold: 6.0
  min_len: 2
  max_len: 4096
  split_max_chars: 200

cache:
  persona_max_size: 50
  persona_max_vram_mb: 512
  idle_timeout_s: 300

environment:
  TRANSFORMERS_OFFLINE: "1"
  HF_HUB_OFFLINE: "1"
  MODELSCOPE_OFFLINE: "1"

api_auth:
  enabled: false
  token: ""

# SSE 事件流配置
sse:
  active_interval: 0.3
  idle_base_interval: 0.5
  idle_max_interval: 3.0
  idle_step: 0.5
  heartbeat_interval: 30.0

# 音频播放器配置
audio_player:
  waveform_steps: 300
  default_sample_rate: 44100
  progress_update_ms: 100

# UI 布局配置
ui:
  sidebar_width: 240
  sidebar_collapsed_width: 52
